name: Commit Activity Log

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit-activity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and log activity
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          USERNAME="NOOBGLITCH"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          LOG_FILE="data/activity-log.csv"
          STATUS_FILE="data/latest-status.json"

          mkdir -p data

          if [ -n "$GH_TOKEN" ]; then
            RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/users/${USERNAME}/events/public?per_page=1")
          else
            RESPONSE=$(curl -s \
              "https://api.github.com/users/${USERNAME}/events/public?per_page=1")
          fi

          if echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['created_at'] if d else '')" 2>/dev/null; then
            CREATED_AT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['created_at'] if d else 'None')")
            EVENT_TYPE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['type'] if d else 'None')")
            REPO_NAME=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['repo']['name'] if d else 'None')")
          else
            CREATED_AT="None"
            EVENT_TYPE="None"
            REPO_NAME="None"
          fi

          echo "$NOW,$CREATED_AT,$EVENT_TYPE,$REPO_NAME" >> "$LOG_FILE"

          python3 -c "
import json, os
now = '$NOW'
created = '$CREATED_AT'
event_type = '$EVENT_TYPE'
repo = '$REPO_NAME'

status = {
    'updatedAt': now,
    'lastActivity': created if created != 'None' else None,
    'eventType': event_type if event_type != 'None' else None,
    'repo': repo if repo != 'None' else None,
    'source': 'github-actions-15min'
}
with open('$STATUS_FILE', 'w') as f:
    json.dump(status, f, indent=2)
"

      - name: Commit and push
        run: |
          git config user.name "MyLastSeen Bot"
          git config user.email "bot@mylastseen.app"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update activity log [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
